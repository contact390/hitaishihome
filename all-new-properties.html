<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Properties</title>
</head>

<body style="font-family:Arial;background:#f3f4f6;margin:0;padding:20px;">

  <h2 style="text-align:center;margin-bottom:25px;font-size:26px;color:#111;">
    All New Properties
  </h2>

  <!-- GRID CONTAINER -->
  <div id="props"
       style="
         display:flex;
         flex-wrap:wrap;
         gap:20px;
         justify-content:center;
         padding:10px;
       ">
  </div>

<script>
/* ---------------------------- LOAD PROPERTIES ---------------------------- */
async function loadNewProperties() {
  const container = document.getElementById("props");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch("http://localhost:5001/api/newproperties");
    const data = await res.json();

    if (!data.success) {
      container.innerHTML = "Failed to load properties";
      return;
    }

    container.innerHTML = "";

    data.properties.forEach(p => {

      /* -------- Resolve image URL -------- */
      let img = "data:image/svg+xml;utf8,\
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>\
          <rect width='100%' height='100%' fill='#e5e7eb'/>\
          <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#9ca3af' font-size='14'>No Image</text>\
        </svg>";

      if (p.imageUrl) {
        let stored = p.imageUrl.toString().trim();
        stored = stored.replace(/^\/+/, "");
        if (!stored.startsWith("uploads")) stored = "uploads/" + stored;
        img = "http://localhost:5001/" + stored;
      }

      /* -------- Google Maps Link -------- */
      const gmap = encodeURIComponent(p.address || p.city || "");
      const mapUrl = `https://www.google.com/maps/search/?api=1&query=${gmap}`;

      /* ---------------- PROPERTY CARD ---------------- */
      const card = `
      <div class="prop-card"
        style="
          width:300px;
          background:white;
          border-radius:14px;
          box-shadow:0 4px 14px rgba(0,0,0,0.12);
          overflow:hidden;
          cursor:pointer;
          transition:all .25s;
        "
        onmouseover="this.style.transform='scale(1.04)'; this.style.boxShadow='0 8px 20px rgba(0,0,0,0.20)'"
        onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 14px rgba(0,0,0,0.12)'"
      >

        <div style="width:100%; height:190px; position:relative;">
          <img src="${img}" style="width:100%; height:100%; object-fit:cover;">

          <!-- HEART ICON -->
          <div onclick="toggleHeart(this)"
            style="
              position:absolute; top:10px; right:10px;
              background:white;
              width:40px; height:40px;
              border-radius:50%;
              display:flex; justify-content:center; align-items:center;
              font-size:22px; cursor:pointer;
              box-shadow:0 2px 6px rgba(0,0,0,0.25);
              transition:.2s;
            ">🤍</div>
        </div>

        <div style="padding:15px;">

          <!-- Type Row -->
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <div style="font-size:14px;"><b>Type:</b> ${p.type || ""}</div>
            <div style="font-size:14px;"><b>Property:</b> ${p.propertyType || ""}</div>
          </div>

          <div style="font-size:14px; margin-bottom:10px;">
            <b>Bedrooms:</b> ${p.bedrooms || ""}
          </div>

          <div style="font-size:14px; margin-bottom:5px;">
            <b>City:</b> ${p.city || ""}
          </div>

          <!-- Address + Map -->
          <a href="${mapUrl}" target="_blank" style="text-decoration:none;">
            <div style="
              font-size:14px;
              color:#1d4ed8;
              margin-bottom:12px;
              display:flex;
              align-items:center;
              gap:6px;
            ">
              <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
                   style="width:16px;height:16px;">
              ${p.address || "Open in Google Maps"}
            </div>
          </a>

          <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <div style="font-size:16px; color:#059669; font-weight:bold;">
              ₹ ${p.price || ""}
            </div>
            <div style="font-size:14px;">
              <b>Pincode:</b> ${p.pincode || ""}
            </div>
          </div>

          <!-- Features -->
          <div style="
            background:#f9fafb;
            border:1px solid #e5e7eb;
            padding:10px;
            font-size:13px;
            border-radius:8px;
            color:#374151;
          ">
            <b>Features:</b><br>
            ${p.features || "No additional features"}
          </div>

          <!-- BUY BUTTON -->
          <button onclick="openBuyForm('${p.id}', '${p.title || ""}')"
            style="
              width:100%;
              padding:12px;
              margin-top:12px;
              background:#2563eb;
              color:white;
              border:none;
              border-radius:8px;
              font-size:15px;
              cursor:pointer;
            ">
            Buy Now
          </button>

        </div>
      </div>`;

      container.innerHTML += card;
    });

  } catch (err) {
    console.log(err);
    container.innerHTML = "Error loading properties.";
  }
}

/* ---------------- HEART TOGGLE ---------------- */
function toggleHeart(el) {
  if (el.innerHTML === "🤍") {
    el.innerHTML = "❤️";
    el.style.transform = "scale(1.25)";
    setTimeout(() => el.style.transform = "scale(1)", 150);
  } else {
    el.innerHTML = "🤍";
  }
}

loadNewProperties();
</script>


<!-- ---------------- BUY FORM POPUP ---------------- -->
<div id="buyPopup" style="
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.45);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
">
  <div style="
    background:white;
    width:90%;
    max-width:420px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.3);
  ">

    <h3 style="text-align:center;margin-bottom:15px;">Buy Property</h3>

    <form id="buyForm">
      <input type="hidden" id="buyPropertyId">

      <label>Name</label>
      <input type="text" id="buyName" required
      style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px;">

      <label>Phone</label>
      <input type="text" id="buyPhone" required maxlength="10"
      style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px;">

      <label>Email</label>
      <input type="email" id="buyEmail" required
      style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px;">

      <label>Message</label>
      <textarea id="buyMsg" rows="3"
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;"></textarea>

      <button type="submit"
      style="
        width:100%; padding:12px; background:#16a34a;
        color:white; border:none; border-radius:8px;
        margin-top:12px; font-size:16px;
      ">
        Submit Request
      </button>

      <button type="button" onclick="closeBuyForm()"
      style="
        width:100%; padding:10px; background:#ef4444;
        color:white; border:none; border-radius:8px;
        margin-top:10px;
      ">
        Cancel
      </button>
    </form>
  </div>
</div>

<script>
function openBuyForm(id) {
  document.getElementById("buyPropertyId").value = id;
  document.getElementById("buyPopup").style.display = "flex";
}
function closeBuyForm() {
  document.getElementById("buyPopup").style.display = "none";
}

/* ---------------- SUBMIT BUY FORM ---------------- */
document.getElementById("buyForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const payload = {
    propertyId: document.getElementById("buyPropertyId").value,
    name: document.getElementById("buyName").value,
    phone: document.getElementById("buyPhone").value,
    email: document.getElementById("buyEmail").value,
    message: document.getElementById("buyMsg").value
  };

  const res = await fetch("http://localhost:5001/api/buyproperty", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();
  if (data.success) {
    alert("Your request has been submitted!");
    closeBuyForm();
    document.getElementById("buyForm").reset();
  } else {
    alert("Failed: " + data.message);
  }
});
</script>


<!-- ---------------- RESPONSIVE CSS ---------------- -->
<style>
@media (max-width: 480px) {
  #props {
    display: grid !important;
    grid-template-columns: 1fr !important;
  }
  .prop-card {
    width: 100% !important;
  }
}

@media (min-width: 481px) and (max-width: 768px) {
  #props {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
  }
  .prop-card {
    width: 100% !important;
  }
}

@media (min-width: 769px) and (max-width: 1200px) {
  #props {
    display: grid !important;
    grid-template-columns: 1fr 1fr 1fr !important;
  }
}
</style>

</body>
</html>
