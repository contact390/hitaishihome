<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - Hitaishi Homes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* Minimal inline styles to match existing site */
    body{font-family:Arial,Helvetica,sans-serif;background:#f7fafc;color:#111;margin:0}
    .container{max-width:1200px;margin:18px auto;padding:12px}
    .dashboard{display:flex;gap:20px}
    .sidebar{width:260px;background:#fff;border-radius:10px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:#222;text-decoration:none;cursor:pointer}
    .nav-item.active{background:linear-gradient(90deg,#10b981,#059669);color:#fff}
    .content{flex:1;background:#fff;border-radius:10px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    @media (max-width:900px){.dashboard{flex-direction:column}.sidebar{width:100%;display:flex;overflow:auto}.nav-item{flex:1;justify-content:center}}
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h1 style="margin:0">Dashboard</h1>
      <div id="userInfo" class="muted">Checking user...</div>
    </div>

    <div class="dashboard">
      <div class="sidebar">
        <h3>Menu</h3>
        <div id="menuPost" class="nav-item active"><i class="fa fa-plus-circle"></i> Post Property</div>
        <div id="menuBrowse" class="nav-item"><i class="fa fa-th-list"></i> Browse Properties</div>
        <div id="menuInterests" class="nav-item"><i class="fa fa-heart"></i> Interests</div>
        <div id="menuHistory" class="nav-item"><i class="fa fa-list"></i> History</div>
        <div id="menuProfile" class="nav-item"><i class="fa fa-user"></i> Profile</div>
        <div id="menuLogout" class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</div>
      </div>

      <div class="content" id="content">
        <!-- sections will be loaded here -->
        <div id="sectionContainer">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    // Check if opened as file:// and redirect to http://
    if (window.location.protocol === 'file:') {
      var newUrl = 'http://localhost:5001/dashboard/dashboard.html';
      console.log('Redirecting from file:// to http://', newUrl);
      window.location.href = newUrl;
    }
    
    // client-side loader to fetch section partials
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    const userInfo = document.getElementById('userInfo');

    if (!token || !user) {
      userInfo.innerText = 'Not logged in';
      alert('Please login first');
      window.location.href = 'http://localhost:5001/Login.html';
    } else {
      userInfo.innerText = user.fullName || user.username;
    }

    const sections = {
      post: 'sections/post.html',
      browse: 'sections/browse.html',
      interests: 'sections/interests.html',
      history: 'sections/history.html',
      profile: 'sections/profile.html'
    };

    async function loadSection(name){
      const container = document.getElementById('sectionContainer');
      container.innerHTML = '<div>Loading...</div>';
      try{
        // Resolve URL relative to current document so loader works from live-server or backend
        const pathname = window.location.pathname;
        const dir = pathname.substring(0, pathname.lastIndexOf('/'));
        let url = sections[name];
        if (!url.startsWith('http') && !url.startsWith('/')) {
          url = dir + '/' + url;
        }

        const res = await fetch(url);
        if (!res.ok) throw new Error('Not found');
        const html = await res.text();

        // Create temporary container to extract scripts
        const tmp = document.createElement('div');
        tmp.innerHTML = html;

        // Insert non-script nodes into container
        container.innerHTML = '';
        Array.from(tmp.childNodes).forEach(node => {
          if (node.nodeName !== 'SCRIPT') container.appendChild(node.cloneNode(true));
        });

        // Execute inline/linked scripts found in fetched HTML
        const scripts = Array.from(tmp.querySelectorAll('script'));
        for (const s of scripts) {
          const newScript = document.createElement('script');
          if (s.src) {
            newScript.src = s.src;
            if (s.async) newScript.async = true;
            if (s.defer) newScript.defer = true;
            document.body.appendChild(newScript);
            await new Promise((resolve) => newScript.addEventListener('load', resolve));
          } else {
            newScript.textContent = s.textContent;
            document.body.appendChild(newScript);
          }
        }

        // Call init function if present
        if (window['init_'+name]) window['init_'+name]();
      }catch(e){ console.error(e); container.innerHTML = '<div>Error loading section</div>'; }
    }

    function activateMenu(id){
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    document.getElementById('menuPost').addEventListener('click', ()=>{ activateMenu('menuPost'); loadSection('post'); });
    document.getElementById('menuBrowse').addEventListener('click', ()=>{ activateMenu('menuBrowse'); loadSection('browse'); });
    document.getElementById('menuInterests').addEventListener('click', ()=>{ activateMenu('menuInterests'); loadSection('interests'); });
    document.getElementById('menuHistory').addEventListener('click', ()=>{ activateMenu('menuHistory'); loadSection('history'); });
    document.getElementById('menuProfile').addEventListener('click', ()=>{ activateMenu('menuProfile'); loadSection('profile'); });
    document.getElementById('menuLogout').addEventListener('click', ()=>{ localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href='/Login.html'; });

    // load default
    loadSection('post');
  </script>
</body>
</html>
