<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Buy Requests</title>
</head>

<body style="font-family: Arial; background:#f3f4f6; padding:20px;">

  <h2 style="text-align:center; margin-bottom:20px;">Property Buy Requests</h2>

  <div id="list"
    style="max-width:900px; margin:auto; display:flex; flex-direction:column; gap:15px;">
  </div>

<script>
async function loadRequests() {
  const box = document.getElementById("list");
  box.innerHTML = "<h3>Loading...</h3>";

  try {
    const res = await fetch("http://localhost:5001/api/buyproperty");
    const data = await res.json();

    if (!data.success) {
      box.innerHTML = "<h3>Error loading requests</h3>";
      return;
    }

    if (data.data.length === 0) {
      box.innerHTML = "<h3>No Buy Requests Found</h3>";
      return;
    }

    box.innerHTML = "";

    data.data.forEach(r => {
      box.innerHTML += `
        <div style="
          background:white; padding:15px; border-radius:10px;
          box-shadow:0 3px 8px rgba(0,0,0,0.15);
        ">
          <h3 style="margin:0 0 10px 0;">Request #${r.id}</h3>
          <p><b>Property ID:</b> ${r.propertyId}</p>
          <p><b>Name:</b> ${r.name}</p>
          <p><b>Phone:</b> ${r.phone}</p>
          <p><b>Email:</b> ${r.email}</p>
          <p><b>Message:</b> ${r.message}</p>
          <p><b>Submitted:</b> ${new Date(r.created_at).toLocaleString()}</p>

          <button onclick="deleteReq(${r.id})"
            style="padding:10px 15px; background:#ef4444;
            color:white; border:none; border-radius:8px;
            cursor:pointer; margin-top:10px;">
            Delete
          </button>
        </div>
      `;
    });

  } catch (err) {
    console.log(err);
    box.innerHTML = "<h3>Error connecting to server</h3>";
  }
}

async function deleteReq(id) {
  if (!confirm("Are you sure you want to delete this request?")) return;

  const res = await fetch(`http://localhost:5001/api/deletebuy/${id}`, {
    method: "DELETE"
  });

  const data = await res.json();

  if (data.success) {
    alert("Deleted Successfully!");
    loadRequests();
  } else {
    alert("Failed to delete!");
  }
}

loadRequests();
</script>

</body>
</html>
