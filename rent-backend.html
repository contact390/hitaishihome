<!DOCTYPE html>
<html>
<body>

<h2>Rent Properties</h2>

<select id="filter">
  <option value="">All</option>
  <option value="apartment">Apartment</option>
  <option value="house">House</option>
</select>

<button onclick="load()">Filter</button>

<div id="list"></div>

<script>
async function load() {
  let type = document.getElementById("filter").value;
  let url = "http://localhost:5001/api/newproperties/rent";

  if (type) url += "?propertyType=" + type;

  try {
    const res = await fetch(url);
    const data = await res.json();

    console.log(data);

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!data.properties || data.properties.length === 0) {
      list.innerHTML = "<p>No properties found</p>";
      return;
    }

    data.properties.forEach(p => {
      list.innerHTML += `
        <div style="border:1px solid #ccc;margin:10px;padding:10px">
          <img src="http://localhost:5001${p.imageUrl || ''}" width="200">
          <h3>${p.title || 'No Title'}</h3>
          <p>₹ ${p.price || 0}</p>
          <p>${p.propertyType}</p>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    alert("Error loading data");
  }
}

load();
</script>

</body>
</html>
